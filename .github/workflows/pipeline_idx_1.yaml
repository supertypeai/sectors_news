name: IDX News Pipeline - Part 1 (Scrape)

on:
  schedule:
    - cron: "10 3 * * *" # 10:10 AM UTC+7
  workflow_dispatch:

concurrency:
  group: idx-pipeline
  cancel-in-progress: false

jobs:
  idx_scrape:
    name: IDX Scrape & Batch 1 & 2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository content
        uses: actions/checkout@v4

      - name: Install uv (Python package manager)
        uses: astral-sh/setup-uv@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv sync
          uv pip install -e .

      - name: Set up Google Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v1
        with:
          # hardcode version to ensure bca works
          chrome-version: '1586874'
          install-chromedriver: true

      - name: Run scraping and process batch 1
        run: |
          echo "=== B1 ==="
          uv run -m scraper_engine.pipeline main_idx --page-number 1 --batch 1 --batch-size 30
          echo "=== B2 ==="
          uv run -m scraper_engine.pipeline main_idx --process-only --batch 2 --batch-size 30
          sleep 20
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_KEY: ${{ secrets.DB_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY1: ${{ secrets.GROQ_API_KEY1 }}
          GROQ_API_KEY2: ${{ secrets.GROQ_API_KEY2 }}
          GROQ_API_KEY_DEV: ${{ secrets.GROQ_API_KEY_DEV }}
          GROQ_API_KEY3: ${{ secrets.GROQ_API_KEY3 }}
          GROQ_API_KEY4: ${{ secrets.GROQ_API_KEY4 }}
          GROQ_API_KEY5: ${{ secrets.GROQ_API_KEY5 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY2: ${{ secrets.GEMINI_API_KEY2 }}
          GEMINI_API_KEY3: ${{ secrets.GEMINI_API_KEY3 }}
          PROXY: ${{ secrets.PROXY }}

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff-index --quiet HEAD || git commit -m "chore(idx): update scraped news data [part 1]"
          git pull --rebase origin main
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
