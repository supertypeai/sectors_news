name: IDX News Pipeline - Part 2 (Process)

on:
  workflow_run:
    workflows: ["IDX News Pipeline - Part 1 (Scrape)"]
    types:
      - completed
    branches:
      - main

concurrency:
  group: idx-pipeline
  cancel-in-progress: false

jobs:
  idx_process:
    name: IDX Process Batches 3-5 & Cleanup
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository content
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install uv (Python package manager)
        uses: astral-sh/setup-uv@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv sync
          uv pip install -e .

      - name: Process batches 3-5 and cleanup
        run: |
          echo "=== B3 ==="
          uv run -m scraper_engine.pipeline main_idx --process-only --batch 3 --batch-size 30
          sleep 20
          echo "=== B4 ==="
          uv run -m scraper_engine.pipeline main_idx --process-only --batch 4 --batch-size 30
          sleep 20
          echo "=== B5 ==="
          uv run -m scraper_engine.pipeline main_idx --process-only --batch 5 --batch-size 30
          sleep 20
          echo "=== CLEANUP ==="
          uv run -m scraper_engine.pipeline remove_outdated_news --table-name idx_news
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_KEY: ${{ secrets.DB_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY1: ${{ secrets.GROQ_API_KEY1 }}
          GROQ_API_KEY2: ${{ secrets.GROQ_API_KEY2 }}
          GROQ_API_KEY_DEV: ${{ secrets.GROQ_API_KEY_DEV }}
          GROQ_API_KEY3: ${{ secrets.GROQ_API_KEY3 }}
          GROQ_API_KEY4: ${{ secrets.GROQ_API_KEY4 }}
          GROQ_API_KEY5: ${{ secrets.GROQ_API_KEY5 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY2: ${{ secrets.GEMINI_API_KEY2 }}
          GEMINI_API_KEY3: ${{ secrets.GEMINI_API_KEY3 }}
          PROXY: ${{ secrets.PROXY }}

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff-index --quiet HEAD || git commit -m "chore(idx): update scraped news data [part 2]"
          git pull --rebase origin main
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
