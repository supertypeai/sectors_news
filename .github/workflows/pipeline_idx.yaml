name: IDX News Pipeline 

on:
  schedule:
    - cron: "0 17 * * *"  # 12:00 AM WIB (UTC+7)
    - cron: "0 23 * * *"  # 06:00 AM WIB
    - cron: "0 5 * * *"   # 12:00 PM WIB
    - cron: "0 11 * * *"  # 06:00 PM WIB
  workflow_dispatch:

concurrency:
  group: idx-pipeline
  cancel-in-progress: false

jobs:
  idx_pipeline:
    name: IDX Scrape & Process
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository content
        uses: actions/checkout@v5

      - name: Install uv (Python package manager)
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv sync
          uv pip install -e .

      - name: Set up Google Chrome & ChromeDriver
        uses: browser-actions/setup-chrome@v1
        with:
          # hardcode version to ensure bca works
          chrome-version: '1586874'
          install-chromedriver: true

      - name: Run scraping and process all batches
        run: |
          BATCH_SIZE=30
          echo "=== B1 ==="
          uv run -m scraper_engine.pipeline main_idx --batch 1 --batch-size $BATCH_SIZE
          sleep 20

          TOTAL=$(python3 -c "import json; print(len(json.load(open('./data/idx/pipeline_filtered.json'))))")
          BATCHES=$(( (TOTAL + BATCH_SIZE - 1) / BATCH_SIZE ))
          echo "Total articles: $TOTAL → $BATCHES batches needed"

          for BATCH in $(seq 2 $BATCHES); do
            echo "=== B${BATCH} ==="
            uv run -m scraper_engine.pipeline main_idx --process-only --batch $BATCH --batch-size $BATCH_SIZE
            sleep 20
          done

          echo "=== CLEANUP ==="
          uv run -m scraper_engine.pipeline remove_outdated_news --table-name idx_news
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_KEY: ${{ secrets.DB_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GROQ_API_KEY1: ${{ secrets.GROQ_API_KEY1 }}
          GROQ_API_KEY2: ${{ secrets.GROQ_API_KEY2 }}
          GROQ_API_KEY_DEV: ${{ secrets.GROQ_API_KEY_DEV }}
          GROQ_API_KEY3: ${{ secrets.GROQ_API_KEY3 }}
          GROQ_API_KEY4: ${{ secrets.GROQ_API_KEY4 }}
          GROQ_API_KEY5: ${{ secrets.GROQ_API_KEY5 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY2: ${{ secrets.GEMINI_API_KEY2 }}
          GEMINI_API_KEY3: ${{ secrets.GEMINI_API_KEY3 }}
          PROXY: ${{ secrets.PROXY }}

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff-index --quiet HEAD || git commit -m "chore(idx): update scraped news data"
          git pull --rebase origin main
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
